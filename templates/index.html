<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#09090e">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
        rel="stylesheet">
    <meta name="author" content="Shakkar Daddy">
    <meta name="description" content="Convert your Resume.io resume to a searchable PDF - by Shakkar Daddy.">
    <meta property="og:title" content="Shakkar Daddy · Resume.io to PDF">
    <meta property="og:description" content="Convert your Resume.io resume to a searchable PDF instantly.">
    <meta property="og:image" content="/static/logo.png">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <title>Resume.io to PDF</title>

    <style>
        :root {
            --bg: #09090e;
            --surface: #111118;
            --surface-elevated: #16161f;
            --border: rgba(255, 255, 255, 0.08);
            --border-subtle: rgba(255, 255, 255, 0.05);
            --text: #ececf1;
            --text-secondary: #9898a8;
            --text-tertiary: #5c5c6e;
            --accent: #6d5ce7;
            --accent-light: #8b7cf7;
            --accent-muted: rgba(109, 92, 231, 0.12);
            --error: #e85d6f;
            --error-bg: rgba(232, 93, 111, 0.08);
            --success: #3ecf8e;
            --radius-lg: 16px;
            --radius-md: 10px;
            --max-width: 1080px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: "Inter", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100%;
            min-height: 100dvh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(600px circle at 15% 10%, rgba(109, 92, 231, 0.07), transparent),
                radial-gradient(500px circle at 85% 90%, rgba(109, 92, 231, 0.05), transparent);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Top bar ── */
        .topbar {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border-subtle);
            background: rgba(9, 9, 14, 0.8);
            backdrop-filter: blur(12px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }

        .brand-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 9px;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--surface-elevated);
            border: 1px solid var(--border);
        }

        .logo {
            display: block;
            object-fit: cover;
        }

        .logo-sm {
            width: 100%;
            height: 100%;
        }

        .logo-md {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .logo-lg {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .brand-name {
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text);
        }

        .brand-tag {
            font-size: 0.875rem;
            color: var(--text);
            font-weight: 500;
        }

        /* ── Main layout ── */
        .container {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1.5rem;
        }

        .layout {
            width: 100%;
            max-width: 520px;
        }

        .workspace {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 32px 64px -24px rgba(0, 0, 0, 0.55);
        }

        .workspace-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 2rem 0;
            text-align: center;
        }

        .workspace-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            margin-bottom: 1rem;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
            flex-shrink: 0;
        }

        .workspace-logo img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .workspace-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.75rem;
            margin-bottom: 1rem;
            border-radius: 999px;
            background: var(--accent-muted);
            border: 1px solid rgba(109, 92, 231, 0.2);
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--accent-light);
        }

        .workspace-badge svg {
            width: 12px;
            height: 12px;
        }

        .title {
            font-family: "Plus Jakarta Sans", sans-serif;
            font-size: clamp(1.625rem, 4vw, 2rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.2;
            color: var(--text);
            margin-bottom: 0;
        }

        .title-highlight {
            background: linear-gradient(135deg, var(--accent-light), #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            line-height: 1.55;
            max-width: 22rem;
            margin: 0 auto;
        }

        .workspace-body {
            padding: 1.75rem 2rem 2rem;
        }

        .workspace-divider {
            height: 1px;
            margin: 0 2rem;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }

        .workspace-features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            border-top: 1px solid var(--border-subtle);
        }

        .feature-chip {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.35rem;
            padding: 1rem 0.75rem;
            text-align: center;
            border-right: 1px solid var(--border-subtle);
        }

        .feature-chip:last-child {
            border-right: none;
        }

        .feature-chip svg {
            width: 16px;
            height: 16px;
            stroke: var(--accent-light);
        }

        .feature-chip strong {
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .feature-chip span {
            font-size: 0.625rem;
            color: var(--text-tertiary);
            line-height: 1.35;
        }

        .br-mobile {
            display: none;
        }

        /* ── Form ── */
        .panel-header {
            margin-bottom: 1.25rem;
        }

        .panel-title {
            font-size: 0.8125rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .panel-desc {
            font-size: 0.8125rem;
            color: var(--text-tertiary);
        }

        .resume_form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .field-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .field-label {
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .char-count {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            font-variant-numeric: tabular-nums;
            transition: color 0.2s;
        }

        .char-count.valid {
            color: var(--success);
        }

        .resume {
            width: 100%;
            padding: 0.8125rem 0.875rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: var(--surface-elevated);
            color: var(--text);
            font-family: ui-monospace, "SF Mono", monospace;
            font-size: 0.8125rem;
            letter-spacing: 0.04em;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .resume::placeholder {
            color: var(--text-tertiary);
            letter-spacing: normal;
            font-family: "Inter", sans-serif;
        }

        .resume:focus {
            border-color: rgba(109, 92, 231, 0.5);
            box-shadow: 0 0 0 3px rgba(109, 92, 231, 0.12);
        }

        .error {
            display: none;
            align-items: flex-start;
            gap: 0.5rem;
            padding: 0.75rem 0.875rem;
            border-radius: var(--radius-md);
            border: 1px solid rgba(232, 93, 111, 0.2);
            background: var(--error-bg);
            color: var(--error);
            font-size: 0.8125rem;
            line-height: 1.4;
        }

        .error svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .error-border {
            border-color: var(--error) !important;
            box-shadow: 0 0 0 3px rgba(232, 93, 111, 0.1) !important;
        }

        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            height: 46px;
            margin-top: 0.25rem;
            border-radius: var(--radius-md);
            border: none;
            font-size: 0.875rem;
            font-weight: 600;
            font-family: "Inter", sans-serif;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent) 0%, #7c6df0 100%);
            box-shadow: 0 4px 16px rgba(109, 92, 231, 0.3);
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
        }

        .btn:hover {
            box-shadow: 0 6px 24px rgba(109, 92, 231, 0.4);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: scale(0.99);
        }

        .btn svg {
            width: 16px;
            height: 16px;
        }

        #loader {
            display: none;
        }

        #submit-text {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .hint {
            margin-top: 1rem;
            padding: 0.75rem 0.875rem;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-subtle);
            font-size: 0.75rem;
            color: var(--text-tertiary);
            line-height: 1.55;
        }

        .hint code {
            font-family: ui-monospace, monospace;
            font-size: 0.6875rem;
            padding: 0.1rem 0.3rem;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
        }

        /* ── Footer ── */
        .footer {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1.25rem 2rem;
            border-top: 1px solid var(--border-subtle);
            font-size: 0.75rem;
            color: var(--text-tertiary);
        }

        .footer .logo-md {
            width: 20px;
            height: 20px;
            border-radius: 5px;
            border: none;
            opacity: 0.7;
        }

        .footer strong {
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* ── Animations ── */
        .spinner_V8m1 {
            transform-origin: center;
            animation: spinner_zKoa 2s linear infinite;
        }

        .spinner_V8m1 circle {
            stroke-linecap: round;
            animation: spinner_YpZS 1.5s ease-in-out infinite;
        }

        @keyframes spinner_zKoa {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes spinner_YpZS {
            0% {
                stroke-dasharray: 0 150;
                stroke-dashoffset: 0;
            }

            47.5% {
                stroke-dasharray: 42 150;
                stroke-dashoffset: -16;
            }

            95%,
            100% {
                stroke-dasharray: 42 150;
                stroke-dashoffset: -59;
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-4px);
            }

            75% {
                transform: translateX(4px);
            }
        }

        .shake {
            animation: shake 0.3s ease;
        }

        /* ── Responsive ── */

        @media (max-width: 640px) {
            .topbar {
                padding: 0.875rem 1rem;
                padding-top: max(0.875rem, env(safe-area-inset-top));
            }

            .brand-icon {
                width: 32px;
                height: 32px;
                border-radius: 8px;
            }

            .brand-tag {
                font-size: 0.8125rem;
            }

            .container {
                padding: 1.25rem 1rem;
                padding-left: max(1rem, env(safe-area-inset-left));
                padding-right: max(1rem, env(safe-area-inset-right));
                align-items: flex-start;
            }

            .layout {
                max-width: 100%;
            }

            .workspace {
                border-radius: 16px;
            }

            .workspace-logo {
                width: 48px;
                height: 48px;
                margin-bottom: 0.875rem;
            }

            .workspace-header {
                padding: 1.5rem 1.25rem 0;
            }

            .workspace-body {
                padding: 1.25rem;
            }

            .workspace-divider {
                margin: 0 1.25rem;
            }

            .title {
                font-size: 1.5rem;
            }

            .br-mobile {
                display: inline;
            }

            .subtitle {
                font-size: 0.875rem;
            }

            .workspace-features {
                grid-template-columns: 1fr;
            }

            .feature-chip {
                flex-direction: row;
                justify-content: flex-start;
                text-align: left;
                padding: 0.75rem 1.25rem;
                border-right: none;
                border-bottom: 1px solid var(--border-subtle);
            }

            .feature-chip:last-child {
                border-bottom: none;
            }

            .feature-chip span {
                font-size: 0.6875rem;
            }

            .resume {
                font-size: 16px;
                padding: 0.875rem;
                letter-spacing: 0.02em;
            }

            .btn {
                height: 48px;
                font-size: 0.9375rem;
                -webkit-tap-highlight-color: transparent;
            }

            .hint {
                font-size: 0.6875rem;
                word-break: break-word;
            }

            .footer {
                padding: 1rem;
                padding-bottom: max(1rem, env(safe-area-inset-bottom));
                flex-wrap: wrap;
            }
        }

        @media (max-width: 380px) {
            .brand-text {
                min-width: 0;
            }

            .brand-tag {
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 140px;
            }

            .workspace-header,
            .workspace-body {
                padding-left: 1rem;
                padding-right: 1rem;
            }

            .field-row {
                flex-wrap: wrap;
                gap: 0.25rem;
            }
        }
    </style>
</head>

<body>
    <main class="container">
        <div class="layout">
            <div class="workspace">
                <div class="workspace-header">
                    <div class="workspace-logo">
                        <img src="/static/logo.png" alt="IOtoPDF logo" width="56" height="56">
                    </div>
                    <div class="workspace-badge">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" />
                            <polyline points="13 2 13 9 20 9" />
                        </svg>
                        Free converter
                    </div>
                    <h1 class="title">
                        <span class="title-highlight">Resume.io</span> to<br class="br-mobile"> PDF
                    </h1>
                </div>

                <div class="workspace-divider"></div>

                <div class="workspace-body">
                    <div class="panel-header">
                        <h2 class="panel-title">Get started</h2>
                        <p class="panel-desc">Enter your 24-character token from Resume.io</p>
                    </div>

                    <form method="post" class="resume_form" id="downloadForm" target="_blank">
                        <div class="field-group">
                            <div class="field-row">
                                <label class="field-label" for="rendering_token">Rendering Token</label>
                                <span class="char-count" id="charCount">0 / 24</span>
                            </div>
                            <input type="text" class="resume" id="rendering_token" name="rendering_token"
                                placeholder="Paste 24-char token" aria-label="Rendering token" maxlength="24"
                                inputmode="text" autocapitalize="off" autocorrect="off" autocomplete="off"
                                spellcheck="false">
                        </div>

                        <span class="error" id="errorMessage">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10" />
                                <line x1="12" y1="8" x2="12" y2="12" />
                                <line x1="12" y1="16" x2="12.01" y2="16" />
                            </svg>
                            <span id="errorText">Token must be exactly 24 alphanumeric characters.</span>
                        </span>

                        <button id="submit-btn" class="btn" type="submit">
                            <span id="submit-text">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                    <polyline points="7 10 12 15 17 10" />
                                    <line x1="12" y1="15" x2="12" y2="3" />
                                </svg>
                                Download
                            </span>
                            <svg id="loader" width="20" height="20" stroke="#fff" viewBox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg">
                                <g class="spinner_V8m1">
                                    <circle cx="12" cy="12" r="9.5" fill="none" stroke-width="3"></circle>
                                </g>
                            </svg>
                        </button>
                    </form>
                </div>

                <div class="workspace-features">
                    <div class="feature-chip">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" />
                            <polyline points="13 2 13 9 20 9" />
                        </svg>
                        <strong>PDF export</strong>
                        <span>Full layout</span>
                    </div>
                    <div class="feature-chip">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        <strong>OCR text</strong>
                        <span>Searchable PDF</span>
                    </div>
                    <div class="feature-chip">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                        </svg>
                        <strong>Instant</strong>
                        <span>No sign-up</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <img class="logo logo-md" src="/static/logo.png" alt="" aria-hidden="true" width="20" height="20">
        Built by <strong>Shakkar Daddy</strong>
    </footer>

    <script>
        const downloadForm = document.getElementById("downloadForm");
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const inputField = document.getElementById('rendering_token');
        const charCount = document.getElementById('charCount');
        const submitText = document.getElementById('submit-text');
        const submitBtn = document.getElementById('submit-btn');
        const loader = document.getElementById('loader');

        function resetSubmitState() {
            submitText.style.display = 'flex';
            loader.style.display = 'none';
            submitBtn.disabled = false;
        }

        window.addEventListener('pageshow', function () {
            resetSubmitState();
        });

        inputField.addEventListener('input', function () {
            const len = this.value.length;
            charCount.textContent = len + ' / 24';
            charCount.classList.toggle('valid', len === 24);
            if (len === 24) {
                errorMessage.style.display = 'none';
                inputField.classList.remove('error-border', 'shake');
            }
        });

        downloadForm.addEventListener("submit", function (e) {
            e.preventDefault();
            const formData = new FormData(downloadForm);
            const rendering_token = formData.get('rendering_token').toString();
            const regex = /^[a-zA-Z0-9]{24}$/;

            if (!regex.test(rendering_token)) {
                errorText.textContent = 'Token must be exactly 24 alphanumeric characters.';
                errorMessage.style.display = 'flex';
                inputField.classList.add('error-border');
                inputField.classList.remove('shake');
                setTimeout(function () {
                    inputField.classList.add('shake');
                }, 50);
                return;
            }

            errorMessage.style.display = 'none';
            inputField.classList.remove('error-border', 'shake');

            downloadForm.action = '/download/' + rendering_token;
            downloadForm.target = '_blank';
            submitText.style.display = 'none';
            loader.style.display = 'block';
            submitBtn.disabled = true;

            this.submit();

            setTimeout(resetSubmitState, 2000);
        });
    </script>
</body>

</html>
